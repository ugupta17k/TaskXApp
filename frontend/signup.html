<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>


    <script>
       async function SignUp(){
            const username = document.getElementById('username').value
            const email = document.getElementById('Email').value
            const password = document.getElementById('password').value

            try{
                const res = await axios.post('http://localhost:3000/signup',{
                    username,
                    email,
                    password
                })
                window.location = '/signin'
            }catch(error){
                console.log(error.response?.data?.message || "Signup failed");
            }
        }
    </script>

  </head>
  <body>
    <div
      class="w-full h-screen bg-zinc-900 p-10 flex justify-center items-center flex-col"
    >
      <div class="text-white text-4xl">Sign Up</div>
      <div
        class="w-[40%] h-[60%] bg-zinc-800 rounded-xl mt-15 flex flex-col pl-20 pr-20 pt-5 border border-zinc-500 gap-4 border-white text-white"
      >
        <label for="">Username</label>
        <input
          class="rounded-xl pl-5 pr-5 pt-2 pb-2 border"
          type="text"
          id="username"
          placeholder="username"
        />
        <label for="">Email</label>
        <input
          class="rounded-xl pl-5 pr-5 pt-2 pb-2 border"
          type="text"
          id="Email"
          placeholder="Email"
        />
        <label for="">Password</label>
        <input
          class="rounded-xl pl-5 pr-5 pt-2 pb-2 border"
          type="password"
          id="password"
          placeholder="Password"
        />
        <button class="bg-zinc-300 pl-20 pr-20 pt-4 pb-4 text-black font-bold cursor-pointer text-xl rounded-3xl" onclick=SignUp()>Sign Up</button>
      </div>
    </div>
  </body>
</html>
